{% extends "base.html" %}

{% block title %}Bad Request{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-warning">
        <div class="card-body text-center py-5">
            <i class="fa-solid fa-circle-exclamation fa-3x text-warning mb-3"></i>

            <h1 class="display-5 fw-bold wt">400</h1>
            <h3 class="mb-3 wt">Bad Request</h3>

            <p class="text-muted mb-4">
                Something about the request was invalid. Please check your input and try again.
            </p>

            <a href="/" class="btn btn-primary">
                Back to Market
            </a>
        </div>
    </div>
</div>
{% endblock %}
