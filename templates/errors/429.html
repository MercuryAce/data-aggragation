{% extends "base.html" %}

{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-danger">
        <div class="card-body text-center py-5">
            <i class="fa-solid fa-hourglass-half fa-3x text-danger mb-3"></i>

            <h1 class="display-5 fw-bold wt">429</h1>
            <h3 class="mb-3 wt">Too Many Requests</h3>

            <p class="text-muted mb-4">
                You are moving a little too quickly. Please wait a moment and try again.
            </p>

            <button class="btn btn-primary" onclick="window.history.back()">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
